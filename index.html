<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Painel Auxílio</title>
<style>
body{
background:#05050a;
color:white;
font-family:Segoe UI;
height:100vh;
margin:0;
overflow:hidden;
}

#loginOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(5,5,10,0.98);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.login-panel {
  width: 350px;
  background: #10101a;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  text-align: center;
}

.login-panel input {
  width: 100%;
  padding: 15px;
  margin: 15px 0;
  border: none;
  border-radius: 10px;
  background: #2a2a3a;
  color: white;
  font-size: 16px;
  box-sizing: border-box;
  font-family: Segoe UI;
}

.login-panel button {
  width: 100%;
  padding: 15px;
  background: #2979ff;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 18px;
  cursor: pointer;
  font-family: Segoe UI;
  font-weight: bold;
  transition: background 0.3s;
}

.login-panel button:hover {
  background: #1e5fcc;
}

#mainPanel {
  display: none;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.panel {
  width: 350px;
  background: #10101a;
  padding: 25px;
  border-radius: 20px;
}

.card {
  display: flex;
  justify-content: space-between;
  margin: 15px 0;
}

.switch {
  position: relative;
  width: 50px;
  height: 26px;
}

.switch input {
  display: none;
}

.slider {
  position: absolute;
  cursor: pointer;
  background: #333;
  border-radius: 20px;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  transition: .3s;
}

.slider:before {
  content: "";
  height: 20px;
  width: 20px;
  background: white;
  position: absolute;
  left: 3px;
  bottom: 3px;
  border-radius: 50%;
  transition: .3s;
}

input:checked + .slider {
  background: #2979ff;
}

input:checked + .slider:before {
  transform: translateX(24px);
}

#particlesCanvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  opacity: 0.5;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-10px); }
  75% { transform: translateX(10px); }
}

#engineArea {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0,0,0,0.3);
  display: none;
  z-index: 500;
  cursor: pointer;
}

#engineInfo {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #10101a;
  padding: 10px 20px;
  border-radius: 10px;
  color: #2979ff;
  font-family: Segoe UI;
  font-weight: bold;
  display: none;
  z-index: 501;
}
</style>
</head>
<body>
<div id="loginOverlay">
  <canvas id="particlesCanvas"></canvas>
  <div class="login-panel">
    <h2>Login no Painel</h2>
    <input id="username" type="text" placeholder="Usuário (rei10)">
    <input id="password" type="password" placeholder="Senha (rei10)">
    <button id="loginBtn">Entrar</button>
    <p style="margin-top:20px; font-size:14px; color:#888;">Dica: Criador:Zs.Xis</p>
  </div>
</div>

<div id="mainPanel">
  <div class="panel">
    <h2>Painel</h2>
    <div class="card">
<span>TouchEngine (Ativar)</span>
      <label class="switch">
        <input id="engineSwitch" type="checkbox">
        <span class="slider"></span>
      </label>
    </div>
    <div class="card">
      <span>Scanner</span>
      <label class="switch">
        <input id="scannerSwitch" type="checkbox">
        <span class="slider"></span>
      </label>
    </div>

    <!-- Engine Area and Info -->
    <div id="engineArea"></div>
    <div id="engineInfo">Movimento: 0.00, 0.00</div>

  </div>
</div>

<script type="module">
document.addEventListener('DOMContentLoaded', () => {
  const loginOverlay = document.getElementById('loginOverlay');
  const mainPanel = document.getElementById('mainPanel');
  const loginBtn = document.getElementById('loginBtn');
  const username = document.getElementById('username');
  const password = document.getElementById('password');

  loginBtn.addEventListener('click', () => {
    if (username.value === 'rei10' && password.value === 'rei10') {
      loginOverlay.style.display = 'none';
      mainPanel.style.display = 'flex';
      if (window.particlesRaf) cancelAnimationFrame(window.particlesRaf);
    } else {
      loginOverlay.style.animation = 'shake 0.5s';
      setTimeout(() => loginOverlay.style.animation = '', 500);
      username.value = '';
      password.value = '';
    }
  });
});

// Particles
const canvas = document.getElementById('particlesCanvas');
const ctx = canvas.getContext('2d');
let particlesRaf;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.vx = (Math.random() - 0.5) * 1;
    this.vy = (Math.random() - 0.5) * 1;
    this.size = Math.random() * 1.5 + 0.5;
    this.opacity = Math.random() * 0.3 + 0.1;
    this.hue = 200 + Math.random() * 40;
  }
  update() {
    this.x += this.vx + Math.sin(Date.now() * 0.001 + this.x * 0.01) * 0.3;
    this.y += this.vy + Math.cos(Date.now() * 0.001 + this.y * 0.01) * 0.3;
    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
  }
  draw() {
    ctx.save();
    ctx.globalAlpha = this.opacity;
    ctx.fillStyle = `hsla(${this.hue}, 40%, 30%, ${this.opacity})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

const particles = Array.from({length: 120}, () => new Particle());

function animateParticles() {
  ctx.fillStyle = 'rgba(5,5,10,0.1)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.update();
    p.draw();
  });
  window.particlesRaf = requestAnimationFrame(animateParticles);
}
animateParticles();

let engineActive = false;
let engineLoaded = false;
let rafId;
let touching = false;

const engineArea = document.getElementById('engineArea');
const engineInfo = document.getElementById('engineInfo');
const engineSwitch = document.getElementById("engineSwitch");

engineSwitch.addEventListener("change", async e => {
  engineActive = e.target.checked;
  if (engineActive) {
    engineArea.style.display = 'block';
    engineInfo.style.display = 'block';
    console.log("TouchEngine ativado");
  } else {
    engineArea.style.display = 'none';
    engineInfo.style.display = 'none';
    touching = false;
    if (rafId) cancelAnimationFrame(rafId);
    console.log("TouchEngine desativado");
  }
});

// TouchEngine integration (require engine.js loaded)
function initEngineEvents() {
  if (engineLoaded) return;
  engineLoaded = true;

  // Touch events
  engineArea.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    TouchEngine.lastX = t.clientX;
    TouchEngine.lastY = t.clientY;
    touching = true;
  }, { passive: true });

  engineArea.addEventListener('touchmove', (e) => {
    if (!touching || !TouchEngine) return;
    const t = e.touches[0];
    const out = TouchEngine.update(t.clientX, t.clientY);
    engineInfo.innerText = `Movimento: ${out.x.toFixed(2)}, ${out.y.toFixed(2)}`;
  }, { passive: true });

  engineArea.addEventListener('touchend', () => {
    touching = false;
  });

  // Mouse events
  engineArea.addEventListener('mousedown', (e) => {
    TouchEngine.lastX = e.clientX;
    TouchEngine.lastY = e.clientY;
    touching = true;
  });

  engineArea.addEventListener('mousemove', (e) => {
    if (!touching || !TouchEngine) return;
    const out = TouchEngine.update(e.clientX, e.clientY);
    engineInfo.innerText = `Movimento: ${out.x.toFixed(2)}, ${out.y.toFixed(2)}`;
  });

  engineArea.addEventListener('mouseup', () => {
    touching = false;
  });

  engineArea.addEventListener('mouseleave', () => {
    touching = false;
  });

  // RAF loop
  function engineLoop() {
    rafId = requestAnimationFrame(engineLoop);
  }
  engineLoop();
}

// Init on first activation
engineSwitch.addEventListener('change', initEngineEvents);

</script>
</body>
</html>
