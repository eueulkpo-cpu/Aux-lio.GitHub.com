<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Painel Auxílio</title>

<style>

body{
background:#05050a;
color:white;
font-family:Segoe UI;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.panel{
width:350px;
background:#10101a;
padding:25px;
border-radius:20px;
}

.card{
display:flex;
justify-content:space-between;
margin:15px 0;
}

.switch{
position:relative;
width:50px;
height:26px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
background:#333;
border-radius:20px;
top:0;
left:0;
right:0;
bottom:0;
}

.slider:before{
content:"";
height:20px;
width:20px;
background:white;
position:absolute;
left:3px;
bottom:3px;
border-radius:50%;
transition:.3s;
}

input:checked + .slider{
background:#2979ff;
}

input:checked + .slider:before{
transform:translateX(24px);
}

</style>
</head>

<body>

<div class="panel">

<h2>Painel</h2>

<div class="card">
<span>Ativar Engine</span>
<label class="switch">
<input id="engineSwitch" type="checkbox">
<span class="slider"></span>
</label>
</div>

<div class="card">
<span>Scanner</span>
<label class="switch">
<input id="scannerSwitch" type="checkbox">
<span class="slider"></span>
</label>
</div>

</div>

<script type="module">

import { boot, handleMove } from "./engine.js"

let engineActive=false

const engineSwitch=document.getElementById("engineSwitch")

engineSwitch.addEventListener("change",async e=>{

engineActive=e.target.checked

if(engineActive){

await boot()

console.log("Engine ligada")

}else{

console.log("Engine desligada")

}

})

window.addEventListener("mousemove",e=>{

if(!engineActive) return

const r=handleMove(e)

console.log("resultado:",r)

})

</script>

</body>
</html>
