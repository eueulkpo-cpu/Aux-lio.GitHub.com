<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Engine</title>

<style>

body{
background:#0b0000;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.panel{
width:320px;
padding:20px;
border-radius:20px;
background:#150000;
box-shadow:0 0 20px red;
}

h1{
text-align:center;
color:red;
margin-bottom:20px;
}

.card{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
margin:10px 0;
border-radius:15px;
background:#1a0000;
box-shadow:0 0 10px red inset;
}

.fov{
flex-direction:column;
align-items:stretch;
}

#fovSlider{
width:100%;
margin-top:10px;
}

#fovValue{
text-align:center;
color:red;
margin-top:10px;
}

.switch{
position:relative;
display:inline-block;
width:50px;
height:24px;
}

.switch input{
display:none;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#400000;
border-radius:34px;
transition:0.3s;
}

.slider:before{
content:"";
position:absolute;
height:18px;
width:18px;
left:3px;
bottom:3px;
background:white;
border-radius:50%;
transition:0.3s;
}

input:checked + .slider{
background:red;
}

input:checked + .slider:before{
transform:translateX(26px);
}

</style>

</head>

<body>

<div class="panel">

<h1>Painel Engine</h1>

<div class="card">
<span>Ativar Engine</span>

<label class="switch">
<input type="checkbox" id="engineToggle">
<span class="slider"></span>
</label>
</div>

<div class="card">
<span>Filtro Anti Tremor</span>

<label class="switch">
<input type="checkbox" id="noiseToggle">
<span class="slider"></span>
</label>
</div>

<div class="card">
<span>Horizontal Boost</span>

<label class="switch">
<input type="checkbox" id="horizontalToggle">
<span class="slider"></span>
</label>
</div>

<div class="card">
<span>Trava de Pixels</span>

<label class="switch">
<input type="checkbox" id="pixelToggle">
<span class="slider"></span>
</label>
</div>

<div class="card fov">

<p>FOV</p>

<input type="range" min="0" max="100" value="50" id="fovSlider">

<div id="fovValue">50%</div>

</div>

</div>

<script src="engine.js"></script>
<script src="enginebundle.js"></script>
<script src="ui.js"></script>

</body>
</html>
